<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>
    <style></style><link rel="stylesheet" href="styles.css"></style>

</head>
<body>
    <div class="container">
        <h1>Task Tracker</h1>
    </div>
    <div class="task-list">
        <ul id="taskList">
        
        </ul>
        <div class="task-input">
            <input type="text" id="taskInput" placeholder="Enter a new task">
            <button class="add-task-button">Add Task</button>
        </div>
        <span class="remaining-tasks">Remaining Tasks: 0</span>
         <div class="Clear-buttons">
            <button class="delete-completed-button">Delete Completed Tasks</button>
            <button class="delete-all-button">Clear All Tasks</button>
         </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
